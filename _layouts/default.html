<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ site.baseurl }}/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="{{ site.baseurl }}/static/style.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WZ31H96XPX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-WZ31H96XPX');
  </script>

  <script>
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark-theme');
    }
  </script>
</head>
<body>
  <header>
    <a href="{{ site.baseurl }}/" class="home-link">{{ site.title }}</a>
    {% include theme-toggle.html %}
  </header>

  <main>
    {% include nav.html %}

    <section class="content">
      {{ content }}
    </section>
  </main>

  {% if page.extra_scripts %}
  {% for script in page.extra_scripts %}
  <script {% if script.type %}type="{{ script.type }}"{% endif %} {% if script.src %}src="{{ site.baseurl }}{{ script.src }}"{% endif %}></script>
  {% endfor %}
  {% endif %}

  <footer>&copy; {{ site.title }}. All rights reserved.</footer>
  <script src="{{ site.baseurl }}/static/theme-toggle.js"></script>
  <script src="{{ site.baseurl }}/static/particles.js"></script>
</body>
</html>
